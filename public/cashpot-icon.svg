<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="goldRadial" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#F0A500"/>
      <stop offset="100%" stop-color="#C47F00"/>
    </radialGradient>
    <radialGradient id="goldBody" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#E8960A"/>
      <stop offset="100%" stop-color="#B8720A"/>
    </radialGradient>
  </defs>

  <!-- Sun rays -->
  <g fill="url(#goldRadial)" opacity="0.95">
    <!-- 24 rays around the circle -->
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(0 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(15 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(30 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(45 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(60 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(75 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(90 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(105 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(120 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(135 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(150 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(165 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(180 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(195 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(210 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(225 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(240 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(255 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(270 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(285 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(300 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(315 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(330 256 256)"/>
    <rect x="249" y="20" width="14" height="52" rx="5" transform="rotate(345 256 256)"/>
  </g>

  <!-- Dollar sign body -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="260" font-weight="bold"
    text-anchor="middle" fill="url(#goldBody)" stroke="#A06800" stroke-width="4">$</text>

  <!-- Center line through dollar sign -->
  <rect x="244" y="80" width="24" height="360" rx="10" fill="url(#goldRadial)"/>
</svg>
